<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gelatinas Artesanales - Jelly Shop</title>
  
  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- Estilos -->
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <!-- Header con gradiente -->
  <header class="main-header">
    <div class="header-container">
      <div class="logo-section">
        <div class="logo-icon">🍮</div>
        <div class="logo-text">
          <h1>Jelly Shop</h1>
          <p>Gelatinas Artesanales</p>
        </div>
      </div>
      
    <div class="cart-wrapper">
      <button class="cart-button" id="cartButton" aria-label="Ver carrito">
        <span class="cart-icon">🛒</span>
        <span class="cart-count" id="cartCount">0</span>
      </button>
      <span class="cart-label">Compra aquí</span>
    </div>
    </div>
  </header>

   <!-- Contenido principal -->
  <main class="main-content">
    <div class="container">
      <!-- Título de sección -->
      <div class="section-header">
        <h2>Nuestras Gelatinas</h2>
      </div>

      <!-- Grid de productos -->
      <div class="products-grid" id="productsGrid">
        <!-- Los productos se cargarán dinámicamente -->
      </div>
      
      <div class="notice-bar">
        <p>📅 Recuerda que los pedidos se hacen como mínimo de 3 a 2 días de anticipación. ¡Gracias por su compra!</p>
      </div>
    </div>
  </main>

  <!-- Modal del carrito -->
  <div class="modal" id="cartModal">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-container">
      <div class="modal-header">
        <h3>🛒 Mi Carrito</h3>
        <button class="close-button" id="closeModal" aria-label="Cerrar carrito">
          <span>×</span>
        </button>
      </div>
      
      <div class="modal-body" id="cartItems">
        <!-- Los items del carrito se cargarán aquí -->
      </div>
      
       <div class="modal-footer">
         <div class="delivery-section">
           <label class="delivery-label">Nombre:</label>
           <input type="text" id="customerName" class="delivery-input" placeholder="Tu nombre" required />
         </div>
         <div class="delivery-section">
           <label class="delivery-label">📅 Fecha y hora tentativa:</label>
           <input type="datetime-local" id="deliveryDateTime" class="delivery-input" required />
           <small class="delivery-note">*Se confirmará 2-3 días antes</small>
         </div>
         <div class="total-row">
           <span class="total-label">Total:</span>
           <span class="total-amount" id="totalAmount">$0.00 MXN</span>
         </div>
         <button class="btn-whatsapp" id="confirmButton">
           <span class="btn-icon">📱</span>
           <span class="btn-text">Enviar Pedido por WhatsApp</span>
         </button>
       </div>
    </div>
  </div>

  <!-- Toast de notificación -->
  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="scripts/cart.js"></script>
</body>
</html>
